; Struttura: src/ contiene solo main.cpp; ogni modulo sta in lib/<nome>/
; (input, battery, drivetrain, arbiter, calibration) e viene risolto
; automaticamente dal Library Dependency Finder di PlatformIO.
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
board_build.partitions = huge_app.csv
; Decommenta per disabilitare l'attuazione reale (dry-run su banco/devkit):
; i motori non toccano GPIO/PWM, ma PID, encoder e log girano normalmente.
; build_flags = -D TEST_MODE
lib_deps =
    hamzayslmn/esp-ps5 @ ^1.3.3